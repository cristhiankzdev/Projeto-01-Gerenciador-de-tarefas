<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerenciador de Tarefas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-body">

  <div class="auth-container">
    <div class="auth-card">

      <div class="auth-logo">
        <svg class="logo-icon" width="44" height="44" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect x="27" y="5" width="13" height="20" rx="5" fill="#1A3A5C"/>
          <rect x="60" y="5" width="13" height="20" rx="5" fill="#1A3A5C"/>
          <rect x="5" y="14" width="90" height="82" rx="12" fill="#1A3A5C"/>
          <rect x="5" y="14" width="90" height="28" rx="12" fill="#163055"/>
          <rect x="5" y="28" width="90" height="14" fill="#163055"/>
          <rect x="12" y="43" width="76" height="46" rx="7" fill="#EBF3FF"/>
          <path d="M30 66 L44 80 L70 54" stroke="#3B82F6" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="logo-text">Gerenciador de Tarefas</span>
        <p class="logo-sub">Organize seu dia com leveza</p>
      </div>

      <div class="auth-tabs">
        <button class="tab-btn active" data-tab="login">Entrar</button>
        <button class="tab-btn" data-tab="register">Criar conta</button>
      </div>

      <button type="button" id="google-btn" class="btn-google">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" height="18" alt=""> Continuar com Google
      </button>
      <div class="auth-divider"><span>ou</span></div>

      <!-- Login -->
      <form id="login-form" class="auth-form">
        <div class="form-group">
          <label for="login-email">E-mail</label>
          <input type="email" id="login-email" placeholder="seu@email.com" autocomplete="email" required>
        </div>
        <div class="form-group">
          <label for="login-password">Senha</label>
          <div class="input-password">
            <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" required>
            <button type="button" class="toggle-password" data-target="login-password" aria-label="Mostrar senha">👁️</button>
          </div>
        </div>
        <div class="form-error" id="login-error" role="alert"></div>
        <button type="submit" class="btn-primary" id="login-btn">
          <span class="btn-text">Entrar</span>
          <span class="btn-spinner" hidden>⏳</span>
        </button>
        <button type="button" class="link-btn" id="forgot-btn">Esqueci minha senha</button>
      </form>

      <!-- Register -->
      <form id="register-form" class="auth-form" style="display:none">
        <div class="form-group">
          <label for="reg-name">Nome completo</label>
          <input type="text" id="reg-name" placeholder="Seu nome" autocomplete="name" required>
        </div>
        <div class="form-group">
          <label for="reg-email">E-mail</label>
          <input type="email" id="reg-email" placeholder="seu@email.com" autocomplete="email" required>
        </div>
        <div class="form-group">
          <label for="reg-password">Senha</label>
          <div class="input-password">
            <input type="password" id="reg-password" placeholder="Mínimo 6 caracteres" autocomplete="new-password" required>
            <button type="button" class="toggle-password" data-target="reg-password" aria-label="Mostrar senha">👁️</button>
          </div>
        </div>
        <div class="form-group">
          <label for="reg-confirm">Confirmar senha</label>
          <div class="input-password">
            <input type="password" id="reg-confirm" placeholder="Repita a senha" autocomplete="new-password" required>
            <button type="button" class="toggle-password" data-target="reg-confirm" aria-label="Mostrar senha">👁️</button>
          </div>
        </div>
        <div class="form-error" id="register-error" role="alert"></div>
        <button type="submit" class="btn-primary" id="register-btn">
          <span class="btn-text">Criar conta</span>
          <span class="btn-spinner" hidden>⏳</span>
        </button>
      </form>

    </div>
  </div>

  <script>
    // Tab switching — roda sempre, independente do módulo Supabase
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'))
        btn.classList.add('active')
        const tab = btn.dataset.tab
        document.getElementById('login-form').style.display = tab === 'login' ? 'flex' : 'none'
        document.getElementById('register-form').style.display = tab === 'register' ? 'flex' : 'none'
        document.getElementById('login-error').textContent = ''
        document.getElementById('register-error').textContent = ''
      })
    })
    document.querySelectorAll('.toggle-password').forEach(btn => {
      btn.addEventListener('click', () => {
        const input = document.getElementById(btn.dataset.target)
        input.type = input.type === 'password' ? 'text' : 'password'
        btn.textContent = input.type === 'password' ? '👁️' : '🙈'
      })
    })
  </script>
  <script type="module" src="js/auth.js"></script>
</body>
</html>
